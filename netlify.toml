 [build]
  # Используем vite-ssg для генерации статичного HTML (SEO prerendering)
  command = "npm run build:ssg"
  publish = "dist"

# Переменные окружения для сборки
# Установите VITE_GA_ID в Netlify: Site Settings → Environment Variables
# [context.production.environment]
#   VITE_GA_ID = "G-XXXXXXXX"

# Заголовки безопасности для всех страниц
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Долгосрочное кэширование статических ассетов (хэши в именах файлов)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
